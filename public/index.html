<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Messenger</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
    }

    .app {
      max-width: 900px;
      margin: 20px auto;
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      overflow: hidden;
    }

    .header {
      padding: 16px 20px;
      font-size: 28px;
      font-weight: bold;
      border-bottom: 1px solid #e5e7eb;
    }

    #chat {
      height: 420px;
      overflow-y: auto;
      padding: 16px;
      background: #fafafa;
    }

    .message {
      margin-bottom: 10px;
      padding: 10px 12px;
      background: #e8f0fe;
      border-radius: 10px;
      width: fit-content;
      max-width: 80%;
    }

    .system {
      margin-bottom: 10px;
      color: #6b7280;
      font-style: italic;
    }

    .input-row {
      display: flex;
      gap: 10px;
      padding: 12px;
      border-top: 1px solid #e5e7eb;
      background: white;
    }

    #msg {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      outline: none;
    }

    #msg:focus {
      border-color: #60a5fa;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">My Messenger</div>

    <div id="chat"></div>

    <div class="input-row">
      <input id="msg" type="text" placeholder="Напиши сообщение..." />
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const chat = document.getElementById("chat");
    const input = document.getElementById("msg");
    const sendBtn = document.getElementById("sendBtn");

    function addSystemMessage(text) {
      const div = document.createElement("div");
      div.className = "system";
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function addChatMessage(user, text) {
      const div = document.createElement("div");
      div.className = "message";
      div.textContent = user + ": " + text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      socket.emit("message", text);
      input.value = "";
      input.focus();
    }

    sendBtn.addEventListener("click", sendMessage);

    input.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    });

    socket.on("message", function (data) {
      addChatMessage(data.user, data.text);
    });

    socket.on("system", function (text) {
      addSystemMessage(text);
    });
  </script>
</body>
</html>
