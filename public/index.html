<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Messenger</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f1f5f9;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* карточка входа */

#login{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
width:320px;
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
}

#login h2{
margin:0 0 10px 0;
}

#avatarPreview{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
background:#e2e8f0;
}

input{
padding:10px;
width:100%;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:10px;
width:100%;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#1d4ed8;
}

/* чат */

#chatPage{
display:none;
flex-direction:column;
height:100vh;
width:100%;
}

.header{
background:#2563eb;
color:white;
padding:15px;
font-size:20px;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
background:#f1f5f9;
}

.message{
display:flex;
align-items:flex-start;
margin-bottom:12px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
margin-right:10px;
object-fit:cover;
}

.bubble{
background:white;
padding:8px 12px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.input-area{
display:flex;
padding:10px;
background:white;
border-top:1px solid #ddd;
}

#msg{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

</style>
</head>

<body>

<div id="login">

<h2>My Messenger</h2>

<img id="avatarPreview">

<input id="nameInput" placeholder="Введите имя">

<input type="file" id="avatarInput" accept="image/*">

<button onclick="enterChat()">Войти</button>

</div>

<div id="chatPage">

<div class="header">My Messenger</div>

<div id="chat"></div>

<div class="input-area">
<input id="msg" placeholder="Напиши сообщение">
<button onclick="send()">Send</button>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

let username=""
let avatar=""

const chat=document.getElementById("chat")
const input=document.getElementById("msg")

const avatarInput=document.getElementById("avatarInput")
const avatarPreview=document.getElementById("avatarPreview")

avatarInput.onchange=()=>{
const file=avatarInput.files[0]
if(file){
avatar=URL.createObjectURL(file)
avatarPreview.src=avatar
}
}

function enterChat(){

const name=document.getElementById("nameInput").value

if(name.trim()==="") return

username=name

document.getElementById("login").style.display="none"
document.getElementById("chatPage").style.display="flex"

}

function send(){

if(input.value.trim()==="") return

socket.emit("chat message",{
user:username,
text:input.value,
avatar:avatar
})

input.value=""

}

socket.on("chat message",(data)=>{

let div=document.createElement("div")
div.className="message"

let img=document.createElement("img")
img.className="avatar"
img.src=data.avatar || ""

let bubble=document.createElement("div")
bubble.className="bubble"
bubble.textContent=data.user + ": " + data.text

div.appendChild(img)
div.appendChild(bubble)

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

})

input.addEventListener("keypress",(e)=>{
if(e.key==="Enter") send()
})

</script>

</body>
</html>
