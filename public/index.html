<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Messenger</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#login{
background:white;
padding:20px;
border-radius:10px;
}

#chat{
display:none;
width:600px;
background:white;
border-radius:10px;
padding:20px;
}

#messages{
height:400px;
overflow-y:auto;
margin-bottom:10px;
}

input{
padding:10px;
width:80%;
}

button{
padding:10px;
}
</style>
</head>

<body>

<div id="login">
<h2>Введите имя</h2>
<input id="username" placeholder="Ваше имя">
<button onclick="enterChat()">Войти</button>
</div>

<div id="chat">

<h2>My Messenger</h2>

<div id="messages"></div>

<input id="messageInput" placeholder="Напиши сообщение...">
<button onclick="sendMessage()">Send</button>

</div>

<script>

let ws
let username=""

function enterChat(){

username=document.getElementById("username").value

if(!username)return

document.getElementById("login").style.display="none"
document.getElementById("chat").style.display="block"

connect()

}

function connect(){

ws=new WebSocket(`ws://${location.host}`)

ws.onmessage=(event)=>{

const messages=document.getElementById("messages")

const div=document.createElement("div")

div.textContent=event.data

messages.appendChild(div)

}

}

function sendMessage(){

const input=document.getElementById("messageInput")

ws.send(username+": "+input.value)

input.value=""

}

</script>

</body>
</html>
