<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Messenger</title>

<style>
body{
font-family: Arial;
background:#eee;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.app{
width:500px;
background:white;
border-radius:10px;
padding:20px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.header{
font-size:24px;
margin-bottom:10px;
}

#chat{
height:350px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
}

.message{
background:#e3f2fd;
padding:6px 10px;
border-radius:8px;
margin-bottom:6px;
}

.input-row{
display:flex;
}

#msg{
flex:1;
padding:8px;
}

button{
padding:8px 14px;
margin-left:6px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="app">

<div class="header">My Messenger</div>

<div id="chat"></div>

<div class="input-row">
<input id="msg" placeholder="Напиши сообщение..." />
<button id="sendBtn">Send</button>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

const chat = document.getElementById("chat")
const input = document.getElementById("msg")
const sendBtn = document.getElementById("sendBtn")

let username = "User" + Math.floor(Math.random()*1000)

function addMessage(text){

const div = document.createElement("div")
div.className="message"
div.textContent=text

chat.appendChild(div)
chat.scrollTop = chat.scrollHeight

}

sendBtn.onclick = () => {

if(input.value.trim()==="") return

const text = username + ": " + input.value

socket.emit("chat message", text)

input.value=""

}

socket.on("chat message",(msg)=>{
addMessage(msg)
})

input.addEventListener("keypress",(e)=>{
if(e.key==="Enter") sendBtn.click()
})

</script>

</body>
</html>
