<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Messenger</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef2f7;
      height: 100vh;
    }

    /* ЭКРАН ВХОДА */
    #loginScreen {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 380px;
      background: white;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .login-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1e293b;
    }

    .login-subtitle {
      color: #64748b;
      margin-bottom: 22px;
      font-size: 14px;
    }

    .avatar-preview-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }

    #avatarPreview {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      object-fit: cover;
      background: #dbeafe;
      border: 3px solid #bfdbfe;
      display: none;
    }

    .fake-avatar {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: #2563eb;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 700;
      border: 3px solid #bfdbfe;
    }

    .field {
      width: 100%;
      margin-bottom: 12px;
    }

    .field input[type="text"] {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
    }

    .field input[type="text"]:focus {
      border-color: #2563eb;
    }

    .file-label {
      display: inline-block;
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      background: #eff6ff;
      color: #1d4ed8;
      cursor: pointer;
      font-weight: 600;
      margin-bottom: 14px;
      border: 1px dashed #93c5fd;
    }

    #avatarInput {
      display: none;
    }

    .enter-btn {
      width: 100%;
      border: none;
      background: #2563eb;
      color: white;
      padding: 13px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .enter-btn:hover {
      background: #1d4ed8;
    }

    /* ЧАТ */
    #chatPage {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    .topbar {
      background: #2563eb;
      color: white;
      padding: 14px 18px;
      font-size: 20px;
      font-weight: 700;
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
      flex-shrink: 0;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
    }

    .message-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 14px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: #2563eb;
    }

    .avatar-letter {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #2563eb;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    .bubble {
      max-width: 72%;
      background: white;
      border-radius: 14px;
      padding: 10px 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      word-break: break-word;
    }

    .name {
      font-size: 13px;
      font-weight: 700;
      color: #2563eb;
      margin-bottom: 4px;
    }

    .text {
      font-size: 15px;
      color: #0f172a;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 12px;
      background: white;
      border-top: 1px solid #dbe1ea;
      flex-shrink: 0;
    }

    #msg {
      flex: 1;
      padding: 13px 15px;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      font-size: 15px;
      outline: none;
    }

    #msg:focus {
      border-color: #2563eb;
    }

    .send-btn {
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 999px;
      padding: 0 18px;
      font-weight: 700;
      cursor: pointer;
      min-width: 78px;
    }

    .send-btn:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>

  <div id="loginScreen">
    <div class="login-card">
      <div class="login-title">My Messenger</div>
      <div class="login-subtitle">Введи имя и выбери аватарку</div>

      <div class="avatar-preview-wrap">
        <div id="defaultAvatar" class="fake-avatar">?</div>
        <img id="avatarPreview" alt="avatar preview" />
      </div>

      <div class="field">
        <input id="nameInput" type="text" placeholder="Введите имя" />
      </div>

      <label class="file-label" for="avatarInput">Выбрать аватарку</label>
      <input id="avatarInput" type="file" accept="image/*" />

      <button class="enter-btn" onclick="enterChat()">Войти</button>
    </div>
  </div>

  <div id="chatPage">
    <div class="topbar">My Messenger</div>

    <div id="chat"></div>

    <div class="input-area">
      <input id="msg" type="text" placeholder="Напиши сообщение..." />
      <button class="send-btn" onclick="send()">Send</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    let username = "";
    let avatar = "";

    const nameInput = document.getElementById("nameInput");
    const avatarInput = document.getElementById("avatarInput");
    const avatarPreview = document.getElementById("avatarPreview");
    const defaultAvatar = document.getElementById("defaultAvatar");

    const loginScreen = document.getElementById("loginScreen");
    const chatPage = document.getElementById("chatPage");
    const chat = document.getElementById("chat");
    const msgInput = document.getElementById("msg");

    avatarInput.addEventListener("change", () => {
      const file = avatarInput.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function (e) {
        const img = new Image();

        img.onload = function () {
          const canvas = document.createElement("canvas");
          const maxSize = 128;

          let width = img.width;
          let height = img.height;

          if (width > height) {
            if (width > maxSize) {
              height = height * (maxSize / width);
              width = maxSize;
            }
          } else {
            if (height > maxSize) {
              width = width * (maxSize / height);
              height = maxSize;
            }
          }

          canvas.width = width;
          canvas.height = height;

          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, width, height);

          avatar = canvas.toDataURL("image/jpeg", 0.7);

          avatarPreview.src = avatar;
          avatarPreview.style.display = "block";
          defaultAvatar.style.display = "none";
        };

        img.src = e.target.result;
      };

      reader.readAsDataURL(file);
    });

    nameInput.addEventListener("input", () => {
      const val = nameInput.value.trim();
      defaultAvatar.textContent = val ? val[0].toUpperCase() : "?";
    });

    function enterChat() {
      const name = nameInput.value.trim();
      if (!name) return;

      username = name;
      loginScreen.style.display = "none";
      chatPage.style.display = "flex";
      msgInput.focus();
    }

    function send() {
      const text = msgInput.value.trim();
      if (!text) return;
      if (!username) return;

      socket.emit("chat message", {
        user: username,
        text: text,
        avatar: avatar
      });

      msgInput.value = "";
      msgInput.focus();
    }

    function createFallbackAvatar(userName) {
      const fallback = document.createElement("div");
      fallback.className = "avatar-letter";
      fallback.textContent = userName ? userName[0].toUpperCase() : "?";
      return fallback;
    }

    socket.on("chat message", (data) => {
      const row = document.createElement("div");
      row.className = "message-row";

      let avatarElement;

      const isValidAvatar =
        typeof data.avatar === "string" &&
        data.avatar.startsWith("data:image/");

      if (isValidAvatar) {
        const img = document.createElement("img");
        img.className = "avatar";
        img.src = data.avatar;
        img.alt = "avatar";

        img.onerror = function () {
          img.replaceWith(createFallbackAvatar(data.user));
        };

        avatarElement = img;
      } else {
        avatarElement = createFallbackAvatar(data.user);
      }

      row.appendChild(avatarElement);

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = data.user || "Unknown";

      const text = document.createElement("div");
      text.className = "text";
      text.textContent = data.text || "";

      bubble.appendChild(name);
      bubble.appendChild(text);
      row.appendChild(bubble);

      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    });

    msgInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        send();
      }
    });
  </script>
</body>
</html>
